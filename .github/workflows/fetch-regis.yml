name: Fetch Regis Timetable

on:
  schedule:
    # Every Monday at 07:00 UTC (14:00 Bangkok time)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      year:
        description: "Academic year (พ.ศ.)"
        required: false
        default: ""
      semester:
        description: "Semester (1, 2, or 3 for Summer)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch timetable from Regis
        env:
          REGIS_YEAR: ${{ github.event.inputs.year || '' }}
          REGIS_SEMESTER: ${{ github.event.inputs.semester || '' }}
        run: python scripts/fetch_regis.py

      - name: Commit updated courses.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/courses.json
          git diff --staged --quiet || git commit -m "📅 Auto-update timetable [skip ci]"
          git push

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regis-debug-screenshots
          path: data/debug/
